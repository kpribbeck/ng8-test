<div class="screen-root" *ngIf="serverData">
  <div class="main-split">
    <div class="left-pane">
      <p>{{ serverData.components.mainContent.text }}</p>
    </div>
    <div class="right-pane">
      <img [src]="serverData.components.mainContent.imageUrl" alt="TV Content">
    </div>
  </div>

  <div class="footer-ticker">
    <div class="ticker-content" [style.animation-duration]="serverData.components.footer.speed">
      {{ serverData.components.footer.msg }}
    </div>
  </div>
</div>
